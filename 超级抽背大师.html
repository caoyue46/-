<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级抽背大师 v2.1.0</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: #333;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 1000px;
            height: 750px;
            max-width: 95%;
            max-height: 90vh;
            position: relative;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }

        .page.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
            z-index: 10;
        }

        .header {
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2.2rem;
            color: #2575fc;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
        }

        h2 {
            font-size: 1.8rem;
            color: #6a11cb;
            margin-bottom: 1.5rem;
        }

        .config-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 20px;
            align-items: center;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 500px;
        }

        .config-label {
            font-size: 1.4rem;
            font-weight: bold;
            color: #6a11cb;
            text-align: right;
        }

        .config-select {
            padding: 12px 20px;
            font-size: 1.1rem;
            border-radius: 10px;
            border: 2px solid #6a11cb;
            background-color: white;
            color: #333;
            cursor: pointer;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff9e6b 100%);
            color: white;
            padding: 14px 50px;
            font-size: 1.4rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            font-weight: bold;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }

        .question-list {
            width: 100%;
            flex-grow: 1;
            overflow-y: auto;
            text-align: left;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 15px;
            margin-bottom: 1.5rem;
        }

        .question-item {
            margin: 10px 0;
            padding: 12px 15px;
            border-left: 4px solid #6a11cb;
            background-color: rgba(106, 17, 203, 0.05);
            border-radius: 5px;
            font-size: 1.3rem;
            line-height: 1.5;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            padding: 12px 40px;
            font-size: 1.3rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            font-weight: bold;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
        }

        .recitation-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            width: 100%;
            height: 100%;
        }

        .question-panel, .student-panel {
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            font-size: 1.5rem;
            color: #6a11cb;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .question-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .q-btn {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .q-btn.available {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }

        .q-btn.available:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .q-btn.used {
            background: linear-gradient(135deg, #4CAF50 0%, #8BC34A 100%);
            color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }

        .q-btn.used:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .question-display {
            flex-grow: 1;
            background: #f8f9fa;
            border: 2px solid #6a11cb;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            line-height: 1.4;
            text-align: center;
            overflow-y: auto;
            font-weight: bold;
            color: #2575fc;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .question-display.highlight {
            animation: highlightQuestion 1s ease;
        }

        @keyframes highlightQuestion {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); background-color: #e6f7ff; }
            100% { transform: scale(1); }
        }

        .student-display {
            flex-grow: 1;
            background: white;
            border: 2px solid #ff6b6b;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            padding: 20px;
            position: relative;
        }

        .control-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .ctrl-btn {
            padding: 14px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }

        .ctrl-btn.roll {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
        }

        .ctrl-btn.stop {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff9e6b 100%);
            color: white;
        }

        .ctrl-btn.pass {
            background: linear-gradient(135deg, #4CAF50 0%, #8BC34A 100%);
            color: white;
        }

        .ctrl-btn.fail {
            background: linear-gradient(135deg, #f44336 0%, #e91e63 100%);
            color: white;
        }

        .result-buttons {
            display: none;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .result-feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        .result-feedback.show-pass {
            color: #4CAF50;
            animation: feedbackAnim 1.5s ease forwards;
        }

        .result-feedback.show-fail {
            color: #f44336;
            animation: feedbackAnim 1.5s ease forwards;
        }

        @keyframes feedbackAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        }

        .ctrl-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .rolling {
            animation: pulse 0.8s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .error-message {
            color: #ff6b6b;
            font-weight: bold;
            margin-top: 10px;
            display: none;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #6a11cb;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 20;
        }

        .shuffle-btn {
            background: linear-gradient(135deg, #ff9800 0%, #ffc107 100%);
            color: white;
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
            font-weight: bold;
            margin-top: 15px;
        }

        .shuffle-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 768px) {
            .container {
                height: auto;
                min-height: 580px;
            }

            h1 {
                font-size: 1.8rem;
            }

            h2 {
                font-size: 1.5rem;
            }

            .config-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .config-label {
                text-align: center;
            }

            .recitation-layout {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .student-display {
                font-size: 2.5rem;
                min-height: 120px;
            }

            .question-display {
                font-size: 1.8rem;
                min-height: 120px;
                padding: 15px;
            }

            .q-btn {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }

            .btn-primary, .btn-secondary, .ctrl-btn {
                padding: 12px 30px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>

    <script>
        // ========== 数据层 — localStorage 读写模块 ==========
        const STORAGE_KEY = 'chouBeiDaShi_records';
        const FOCUS_KEY = 'chouBeiDaShi_focus';

        function isStorageAvailable() {
            try {
                const testKey = '__storage_test__';
                localStorage.setItem(testKey, '1');
                localStorage.removeItem(testKey);
                return true;
            } catch (e) {
                return false;
            }
        }

        function loadRecords() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        }

        function saveRecords(records) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            } catch (e) {
                alert('数据保存失败，可能存储空间已满');
            }
        }

        function addRecord(className, topic, student, question, result) {
            const now = new Date();
            const record = {
                date: now.toLocaleDateString('zh-CN'),
                time: now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
                className: className,
                topic: topic,
                student: student,
                question: question,
                result: result
            };
            const records = loadRecords();
            records.push(record);
            saveRecords(records);
            return record;
        }

                "5. 发展的实质（发展和运动、变化一样吗？）",
                "6. 新旧事物的判断标准（区分：新事物、新出现的事物）",
                "7. 发展的形式或状态（\u201c量变必然导致质变\u201d对吗？）",
                "8. 辩证的否定的实质",
                "9. 事物发展的前途、道路"
            ],
            "辩证法（下）": [
                "1. 事物发展的源泉和动力是什么？",
                "2. 矛盾的含义、基本属性",
                "3. 【斗争性/同一性】寓于【斗争性/同一性】之中P61；【普遍性/特殊性】寓于【普遍性/特殊性】之中",
                "4. 坚持唯物辩证法的前提",
                "5. 矛盾问题的精髓",
                "6. 什么对事物发展起决定作用？什么决定事物的性质？",
                "7. 区别：主次矛、矛主次",
                "8. 什么是\u201c马克思主义活的灵魂\u201d？正确认识事物的基础？解决矛盾的关键？",
                "9. 唯物辩证法与形而上学对立的焦点和根本分歧"
            ],
            "认识论": [
                "1. 感性认识与理性认识的关系",
                "2. 什么是直接现实性？谁有？",
                "3. 实践的三个特点",
                "4. 获得认识的来源有几个？途径呢？",
                "5. 【原理与方法论】实践与认识的辩证关系",
                "6. 真理的含义、最基本属性、数量，内容【主观/客观】，形式【主观/客观】",
                "7. 判断正误：a.真理和谬误相互包含b.真理是放之四海皆准的c.真理可以被超越、否定、推翻 ",
                "8. 认识是怎么上升的？"
            ],
            "历史唯物主义": [
                "1. 历史观的基本问题",
                "2. 社会意识与社会存在同步吗？能促进社会发展吗？能起决定作用吗？",
                "3. 【原理与方法论】社会存在与社会意识的辩证关系",
                "4. 人类社会存在和发展的基础",
                "5. 什么决定着社会的性质和面貌？决定着社会形态的更替？",
                "6. 生产力、生产关系的基本要素",
                "7. 社会历史发展的规律",
                "8. 人类社会的基本矛盾",
                "9. 社会发展的总趋势、过程",
                "10. 社会发展的根本动力、直接动力",
                "11. 改革的根本目的、作用",
                "12. 人民群众的含义、地位、作用",
                "13. 群众观点和群众路线的基本内容、地位"
            ],
            "实现人生的价值": [
                "1. 评价一个人的最根本标准",
                "2. 价值观有正误之分吗？都能起促进作用吗？能起决定作用吗？",
                "3. 社会主义核心价值观的基本内容、层面",
                "4. 价值判断和价值选择的关系？均源于什么？",
                "5. 价值判断和价值选择的判断标准（最高的？）",
                "6. 创造和实现人生价值的前提",
                "7. 人生价值的创造与实现"
            ]
        };

        // ========== 状态变量 ==========
        let currentClass = "高一8班";
        let currentTopic = "辩证法（上）";
        let currentStudents = [];
        let currentQuestions = [];
        let usedQuestions = [];
        let isRolling = false;
        let rollInterval = null;
        let lastSelectedQuestion = '';
        let lastSelectedStudent = '';
        let storageAvailable = false;

        // ========== DOM元素 ==========
        const configPage = document.getElementById('configPage');
        const waitingPage = document.getElementById('waitingPage');
        const recitationPage = document.getElementById('recitationPage');

        const classSelect = document.getElementById('classSelect');
        const topicSelect = document.getElementById('topicSelect');
        const startClassBtn = document.getElementById('startClassBtn');
        const configError = document.getElementById('configError');

        const classTopicTitle = document.getElementById('classTopicTitle');
        const questionListContainer = document.getElementById('questionListContainer');
        const startRecitationBtn = document.getElementById('startRecitationBtn');
        const backToConfigBtn1 = document.getElementById('backToConfigBtn1');

        const recitationTitle = document.getElementById('recitationTitle');
        const questionButtons = document.getElementById('questionButtons');
        const currentQuestionDisplay = document.getElementById('currentQuestionDisplay');
        const studentDisplay = document.getElementById('studentDisplay');
        const rollBtn = document.getElementById('rollBtn');
        const stopBtn = document.getElementById('stopBtn');
        const backToQuestionListBtn = document.getElementById('backToQuestionListBtn');
        const shuffleQuestionsBtn = document.getElementById('shuffleQuestionsBtn');
        const controlButtons = document.getElementById('controlButtons');
        const resultButtons = document.getElementById('resultButtons');
        const passBtn = document.getElementById('passBtn');
        const failBtn = document.getElementById('failBtn');
        const resultFeedback = document.getElementById('resultFeedback');

        // ========== 初始化 ==========
        classSelect.value = currentClass;
        topicSelect.value = currentTopic;

        const synth = window.speechSynthesis;

        function speakText(text, rate = 0.9, pitch = 1.0) {
            if (synth.speaking) {
                synth.cancel();
            }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = rate;
            utterance.pitch = pitch;
            synth.speak(utterance);
        }

        // ========== 页面切换函数 ==========
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => {
                p.classList.remove('active');
            });
            page.classList.add('active');
        }

        // ========== 配置页逻辑 ==========
        startClassBtn.addEventListener('click', () => {
            const selectedClass = classSelect.value;
            const selectedTopic = topicSelect.value;

            if (!selectedClass || !selectedTopic) {
                configError.style.display = 'block';
                return;
            }

            configError.style.display = 'none';

            currentClass = selectedClass;
            currentTopic = selectedTopic;
            currentStudents = [...allClassStudents[currentClass]];
            currentQuestions = [...topicQuestions[currentTopic]];
            usedQuestions = [];

            classTopicTitle.textContent = `${currentClass} - ${currentTopic}`;
            renderQuestionList();
            showPage(waitingPage);
        });

        function renderQuestionList() {
            questionListContainer.innerHTML = '';
            currentQuestions.forEach((question) => {
                const questionItem = document.createElement('div');
                questionItem.className = 'question-item';
                questionItem.textContent = question;
                questionListContainer.appendChild(questionItem);
            });
        }

        // ========== 候课页逻辑 ==========
        startRecitationBtn.addEventListener('click', () => {
            recitationTitle.textContent = `${currentClass} - ${currentTopic}`;
            renderQuestionButtons();
            currentQuestionDisplay.textContent = '请选择一个问题';
            studentDisplay.childNodes[0].textContent = '?';
            lastSelectedQuestion = '';
            lastSelectedStudent = '';
            controlButtons.style.display = 'flex';
            resultButtons.style.display = 'none';
            showPage(recitationPage);
        });

        backToConfigBtn1.addEventListener('click', () => {
            showPage(configPage);
        });

        // ========== 抽背页逻辑 ==========
        function renderQuestionButtons() {
            questionButtons.innerHTML = '';
            const shuffledQuestions = [...currentQuestions];
            shuffleArray(shuffledQuestions);

            shuffledQuestions.forEach((question, index) => {
                const button = document.createElement('button');
                button.className = 'q-btn available';
                button.textContent = index + 1;
                button.dataset.question = question;

                button.addEventListener('click', () => {
                    if (button.classList.contains('available')) {
                        const questionText = question.replace(/^\d+\.\s/, '');
                        currentQuestionDisplay.textContent = questionText;
                        lastSelectedQuestion = questionText;
                        currentQuestionDisplay.classList.add('highlight');
                        speakText(`问题：${questionText}`);

                        setTimeout(() => {
                            currentQuestionDisplay.classList.remove('highlight');
                        }, 1000);

                        button.classList.remove('available');
                        button.classList.add('used');
                        usedQuestions.push(question);
                    }
                });

                questionButtons.appendChild(button);
            });
        }

        shuffleQuestionsBtn.addEventListener('click', () => {
            renderQuestionButtons();
        });

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // ========== 智能抽选（关注名单优先） ==========
        function getSmartTarget(students) {
            if (students.length === 0) {
                return students[0];
            }

            const focusList = loadFocusList(currentClass, currentTopic);
            const focusRemaining = students.filter(s => focusList.includes(s));

            if (focusRemaining.length > 0) {
                return focusRemaining[Math.floor(Math.random() * focusRemaining.length)];
            }

            return students[Math.floor(Math.random() * students.length)];
        }

        // 学生抽选逻辑
        rollBtn.addEventListener('click', () => {
            if (currentStudents.length === 0) {
                alert('所有学生都已抽选完毕！');
                return;
            }

            isRolling = true;
            studentDisplay.classList.add('rolling');

            // 智能模式：先滚动动画，2秒后停在目标学生
            const target = getSmartTarget(currentStudents);

            rollInterval = setInterval(() => {
                const randomIndex = Math.floor(Math.random() * currentStudents.length);
                studentDisplay.childNodes[0].textContent = currentStudents[randomIndex];
            }, 100);

            setTimeout(() => {
                if (isRolling) {
                    clearInterval(rollInterval);
                    isRolling = false;
                    studentDisplay.classList.remove('rolling');
                    studentDisplay.childNodes[0].textContent = target;
                    lastSelectedStudent = target;
                    speakText(target, 1.0, 1.2);

                    const index = currentStudents.indexOf(target);
                    if (index > -1) currentStudents.splice(index, 1);

                    controlButtons.style.display = 'none';
                    resultButtons.style.display = 'flex';
                }
            }, 2000);
        });

        stopBtn.addEventListener('click', () => {
            if (!isRolling) return;

            clearInterval(rollInterval);
            isRolling = false;
            studentDisplay.classList.remove('rolling');

            const selectedStudent = studentDisplay.childNodes[0].textContent;
            lastSelectedStudent = selectedStudent;
            speakText(selectedStudent, 1.0, 1.2);

            const index = currentStudents.indexOf(selectedStudent);
            if (index > -1) {
                currentStudents.splice(index, 1);
            }

            controlButtons.style.display = 'none';
            resultButtons.style.display = 'flex';
        });

        // ========== 通过/不通过按钮 ==========
        function handleResult(result) {
            if (storageAvailable && lastSelectedStudent) {
                const questionToSave = lastSelectedQuestion || '未选择问题';
                addRecord(currentClass, currentTopic, lastSelectedStudent, questionToSave, result);
            }

            resultFeedback.textContent = result === 'pass' ? '✓' : '✗';
            resultFeedback.className = 'result-feedback ' + (result === 'pass' ? 'show-pass' : 'show-fail');

            setTimeout(() => {
                resultFeedback.className = 'result-feedback';
                resultFeedback.textContent = '';
                controlButtons.style.display = 'flex';
                resultButtons.style.display = 'none';
            }, 1500);
        }

        passBtn.addEventListener('click', () => handleResult('pass'));
        failBtn.addEventListener('click', () => handleResult('fail'));

        // 返回候课页
        backToQuestionListBtn.addEventListener('click', () => {
            if (isRolling) {
                clearInterval(rollInterval);
                isRolling = false;
                studentDisplay.classList.remove('rolling');
            }
            showPage(waitingPage);
        });

        // ========== 初始化 ==========
        function initApp() {
            storageAvailable = isStorageAvailable();
            if (!storageAvailable) {
                alert('提示：当前浏览器不支持本地存储，抽背记录将无法保存。\n建议使用 Chrome 或 Edge 浏览器打开此文件。');
            }

            currentStudents = [...allClassStudents[currentClass]];
            currentQuestions = [...topicQuestions[currentTopic]];
            renderQuestionList();
        }

        initApp();
    </script>
</body>
</html>
