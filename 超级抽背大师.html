<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级抽背大师 v2.0</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: #333;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 1000px;
            height: 750px;
            max-width: 95%;
            max-height: 90vh;
            position: relative;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }

        .page.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
            z-index: 10;
        }

        .header {
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2.2rem;
            color: #2575fc;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
        }

        h2 {
            font-size: 1.8rem;
            color: #6a11cb;
            margin-bottom: 1.5rem;
        }

        .config-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 20px;
            align-items: center;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 500px;
        }

        .config-label {
            font-size: 1.4rem;
            font-weight: bold;
            color: #6a11cb;
            text-align: right;
        }

        .config-select {
            padding: 12px 20px;
            font-size: 1.1rem;
            border-radius: 10px;
            border: 2px solid #6a11cb;
            background-color: white;
            color: #333;
            cursor: pointer;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff9e6b 100%);
            color: white;
            padding: 14px 50px;
            font-size: 1.4rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            font-weight: bold;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }

        /* 学情看板按钮 */
        .btn-dashboard {
            background: linear-gradient(135deg, #4CAF50 0%, #8BC34A 100%);
            color: white;
            padding: 12px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            font-weight: bold;
            margin-top: 0.5rem;
        }

        .btn-dashboard:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }

        .question-list {
            width: 100%;
            flex-grow: 1;
            overflow-y: auto;
            text-align: left;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 15px;
            margin-bottom: 1.5rem;
        }

        .question-item {
            margin: 10px 0;
            padding: 12px 15px;
            border-left: 4px solid #6a11cb;
            background-color: rgba(106, 17, 203, 0.05);
            border-radius: 5px;
            font-size: 1.3rem;
            line-height: 1.5;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            padding: 12px 40px;
            font-size: 1.3rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            font-weight: bold;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
        }

        .recitation-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            width: 100%;
            height: 100%;
        }

        .question-panel, .student-panel {
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            font-size: 1.5rem;
            color: #6a11cb;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .question-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .q-btn {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .q-btn.available {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }

        .q-btn.available:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .q-btn.used {
            background: linear-gradient(135deg, #4CAF50 0%, #8BC34A 100%);
            color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }

        .q-btn.used:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .question-display {
            flex-grow: 1;
            background: #f8f9fa;
            border: 2px solid #6a11cb;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            line-height: 1.4;
            text-align: center;
            overflow-y: auto;
            font-weight: bold;
            color: #2575fc;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .question-display.highlight {
            animation: highlightQuestion 1s ease;
        }

        @keyframes highlightQuestion {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); background-color: #e6f7ff; }
            100% { transform: scale(1); }
        }

        .student-display {
            flex-grow: 1;
            background: white;
            border: 2px solid #ff6b6b;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            padding: 20px;
            position: relative;
        }

        .control-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .ctrl-btn {
            padding: 14px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }

        .ctrl-btn.roll {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
        }

        .ctrl-btn.stop {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff9e6b 100%);
            color: white;
        }

        /* 通过/不通过按钮 */
        .ctrl-btn.pass {
            background: linear-gradient(135deg, #4CAF50 0%, #8BC34A 100%);
            color: white;
        }

        .ctrl-btn.fail {
            background: linear-gradient(135deg, #f44336 0%, #e91e63 100%);
            color: white;
        }

        .result-buttons {
            display: none;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        /* 结果反馈动画 */
        .result-feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        .result-feedback.show-pass {
            color: #4CAF50;
            animation: feedbackAnim 1.5s ease forwards;
        }

        .result-feedback.show-fail {
            color: #f44336;
            animation: feedbackAnim 1.5s ease forwards;
        }

        @keyframes feedbackAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        }


        .ctrl-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .rolling {
            animation: pulse 0.8s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .error-message {
            color: #ff6b6b;
            font-weight: bold;
            margin-top: 10px;
            display: none;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #6a11cb;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 20;
        }

        .shuffle-btn {
            background: linear-gradient(135deg, #ff9800 0%, #ffc107 100%);
            color: white;
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
            font-weight: bold;
            margin-top: 15px;
        }

        .shuffle-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        /* ========== 学情看板样式 ========== */
        .dashboard-page {
            overflow-y: auto;
        }

        .dashboard-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .dashboard-header h2 {
            margin-bottom: 0;
        }

        .dashboard-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .dashboard-select {
            padding: 8px 15px;
            font-size: 1rem;
            border-radius: 8px;
            border: 2px solid #4CAF50;
            background-color: white;
            color: #333;
            cursor: pointer;
        }

        .btn-export {
            background: linear-gradient(135deg, #ff9800 0%, #ffc107 100%);
            color: white;
            padding: 8px 20px;
            font-size: 1rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.15);
        }

        .btn-export:hover {
            transform: translateY(-2px);
        }

        .btn-clear-data {
            background: linear-gradient(135deg, #f44336 0%, #e91e63 100%);
            color: white;
            padding: 8px 20px;
            font-size: 1rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.15);
        }

        .btn-clear-data:hover {
            transform: translateY(-2px);
        }

        /* 标签页切换 */
        .tab-bar {
            display: flex;
            gap: 0;
            width: 100%;
            margin-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            background: transparent;
            color: #999;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s ease;
            margin-bottom: -2px;
        }

        .tab-btn.active {
            color: #4CAF50;
            border-bottom-color: #4CAF50;
        }

        .tab-btn:hover {
            color: #4CAF50;
        }

        .tab-content {
            display: none;
            width: 100%;
            flex-grow: 1;
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
        }

        /* 总览卡片 */
        .overview-cards {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .overview-card {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            min-width: 140px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        .overview-card .card-value {
            font-size: 2rem;
            font-weight: bold;
        }

        .overview-card .card-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* 纯CSS条形图 */
        .bar-chart {
            width: 100%;
            text-align: left;
        }

        .bar-row {
            display: flex;
            align-items: center;
            margin: 8px 0;
            gap: 10px;
        }

        .bar-label {
            min-width: 120px;
            font-size: 0.95rem;
            text-align: right;
            color: #555;
            flex-shrink: 0;
        }

        .bar-track {
            flex-grow: 1;
            height: 28px;
            background: #f0f0f0;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            border-radius: 14px;
            background: linear-gradient(90deg, #4CAF50 0%, #8BC34A 100%);
            transition: width 0.6s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            min-width: 0;
        }

        .bar-fill.low {
            background: linear-gradient(90deg, #f44336 0%, #ff5722 100%);
        }

        .bar-fill.medium {
            background: linear-gradient(90deg, #ff9800 0%, #ffc107 100%);
        }

        .bar-value {
            font-size: 0.85rem;
            font-weight: bold;
            color: white;
            white-space: nowrap;
        }

        .bar-value-outside {
            font-size: 0.85rem;
            font-weight: bold;
            color: #666;
            margin-left: 8px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* 学生表格 */
        .student-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .student-table th {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            padding: 10px 12px;
            text-align: center;
            position: sticky;
            top: 0;
        }

        .student-table td {
            padding: 8px 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .student-table tr:hover {
            background-color: #f5f5f5;
        }

        .student-table .rate-low {
            color: #f44336;
            font-weight: bold;
        }

        .student-table .rate-medium {
            color: #ff9800;
            font-weight: bold;
        }

        .student-table .rate-high {
            color: #4CAF50;
            font-weight: bold;
        }

        .no-data {
            text-align: center;
            color: #999;
            font-size: 1.2rem;
            padding: 40px 0;
        }


        /* 关注名单标签 */
        .focus-section {
            width: 100%;
            text-align: left;
            margin-bottom: 1rem;
        }

        .focus-title {
            font-size: 1.1rem;
            color: #999;
            margin-bottom: 8px;
            padding-left: 5px;
        }

        .focus-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 120px;
            overflow-y: auto;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .focus-tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            border: 2px solid #e0e0e0;
            background: white;
            color: #666;
            transition: all 0.15s ease;
            user-select: none;
        }

        .focus-tag:hover {
            border-color: #ff9800;
        }

        .focus-tag.focused {
            background: linear-gradient(135deg, #ff9800 0%, #ffc107 100%);
            color: white;
            border-color: #ff9800;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .container {
                height: auto;
                min-height: 580px;
            }

            h1 {
                font-size: 1.8rem;
            }

            h2 {
                font-size: 1.5rem;
            }

            .config-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .config-label {
                text-align: center;
            }

            .recitation-layout {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .student-display {
                font-size: 2.5rem;
                min-height: 120px;
            }

            .question-display {
                font-size: 1.8rem;
                min-height: 120px;
                padding: 15px;
            }

            .q-btn {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }

            .btn-primary, .btn-secondary, .ctrl-btn {
                padding: 12px 30px;
                font-size: 1.1rem;
            }

            .bar-label {
                min-width: 80px;
                font-size: 0.85rem;
            }

            .overview-card {
                min-width: 100px;
                padding: 10px 15px;
            }

            .overview-card .card-value {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 页面容器 -->
    <div class="container">
        <!-- 第1页：配置页 -->
        <div class="page active" id="configPage">
            <div class="header">
                <h1>超级抽背大师</h1>
            </div>

            <div class="config-grid">
                <div class="config-label">班级</div>
                <select id="classSelect" class="config-select">
                    <option value="">--请选择--</option>
                    <option value="高一8班" selected>高一8班</option>
                    <option value="高一12班">高一12班</option>
                    <option value="高一16班">高一16班</option>
                    <option value="高一20班">高一20班</option>
                </select>

                <div class="config-label">课题</div>
                <select id="topicSelect" class="config-select">
                    <option value="">--请选择--</option>
                    <option value="导论（时代精神的精华）">导论（时代精神的精华）</option>
                    <option value="唯物论">唯物论</option>
                    <option value="辩证法（上）" selected>辩证法（上）</option>
                    <option value="辩证法（下）">辩证法（下）</option>
                    <option value="认识论">认识论</option>
                    <option value="历史唯物主义">历史唯物主义</option>
                    <option value="实现人生的价值">实现人生的价值</option>
                </select>
            </div>

            <button class="btn-primary" id="startClassBtn">上课</button>
            <button class="btn-dashboard" id="dashboardBtn">学情看板</button>
            <div class="error-message" id="configError">请先选择班级和课题！</div>
        </div>

        <!-- 第2页：候课页 -->
        <div class="page" id="waitingPage">
            <button class="back-btn" id="backToConfigBtn1">←</button>
            <div class="header">
                <h1 id="classTopicTitle">高二7班 - 辩证法（上）</h1>
                <h2>候课</h2>
            </div>

            <div class="question-list" id="questionListContainer">
            </div>

            <div class="focus-section">
                <div class="focus-title">关注名单（点击姓名设置）</div>
                <div class="focus-tags" id="focusTags"></div>
            </div>

            <button class="btn-secondary" id="startRecitationBtn">开始抽背</button>
        </div>

        <!-- 第3页：抽背页 -->
        <div class="page" id="recitationPage">
            <button class="back-btn" id="backToQuestionListBtn">←</button>
            <h1 id="recitationTitle">高二7班 - 辩证法（上）</h1>

            <div class="recitation-layout">
                <!-- 左侧：问题区域 -->
                <div class="question-panel">
                    <div class="panel-title">问题抽选</div>
                    <div class="question-buttons" id="questionButtons">
                    </div>
                    <div class="question-display" id="currentQuestionDisplay">
                        请选择一个问题
                    </div>
                    <button class="shuffle-btn" id="shuffleQuestionsBtn">随机排序问题</button>
                </div>

                <!-- 右侧：学生区域 -->
                <div class="student-panel">
                    <div class="panel-title">学生抽选</div>
                    <div class="student-display" id="studentDisplay">
                        ?
                        <span class="result-feedback" id="resultFeedback"></span>
                    </div>

                    <div class="control-buttons" id="controlButtons">
                        <button class="ctrl-btn roll" id="rollBtn">抽选</button>
                        <button class="ctrl-btn stop" id="stopBtn">停止</button>
                    </div>
                    <div class="result-buttons" id="resultButtons">
                        <button class="ctrl-btn pass" id="passBtn">通过 ✓</button>
                        <button class="ctrl-btn fail" id="failBtn">不通过 ✗</button>
                    </div>

                </div>
            </div>
        </div>

        <!-- 第4页：学情看板 -->
        <div class="page dashboard-page" id="dashboardPage">
            <button class="back-btn" id="backToConfigBtn2">←</button>

            <div class="dashboard-header">
                <h2>学情看板</h2>
                <div class="dashboard-controls">
                    <select id="dashboardClassFilter" class="dashboard-select">
                        <option value="all">全部班级</option>

                localStorage.removeItem(testKey);
                return true;
            } catch (e) {
                return false;

        function loadRecords() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                console.error('读取记录失败:', e);
                return [];
            }
        }

        // 保存所有记录
        function saveRecords(records) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(records));

                alert('数据保存失败，可能存储空间已满');

                className: className,
                topic: topic,
                student: student,
                question: question,
                result: result  // 'pass' 或 'fail'
            };
            const records = loadRecords();
            records.push(record);
            saveRecords(records);
            return record;
        }

        // ========== 初始化 ==========
        classSelect.value = currentClass;

        const synth = window.speechSynthesis;

        function speakText(text, rate = 0.9, pitch = 1.0) {
            if (synth.speaking) {
                synth.cancel();
            }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = rate;
            utterance.pitch = pitch;
            synth.speak(utterance);
        }

        // ========== 页面切换函数 ==========
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => {
                p.classList.remove('active');
            });
            page.classList.add('active');
        }

        // ========== 配置页逻辑 ==========
        startClassBtn.addEventListener('click', () => {
            const selectedClass = classSelect.value;
            const selectedTopic = topicSelect.value;

            if (!selectedClass || !selectedTopic) {
                configError.style.display = 'block';
                return;
            }

            configError.style.display = 'none';

            currentClass = selectedClass;
            currentTopic = selectedTopic;
            currentStudents = [...allClassStudents[currentClass]];
            currentQuestions = [...topicQuestions[currentTopic]];
            usedQuestions = [];

            classTopicTitle.textContent = `${currentClass} - ${currentTopic}`;
            renderQuestionList();
            renderFocusTags();
            showPage(waitingPage);
        });

        // 学情看板按钮
        dashboardBtn.addEventListener('click', () => {
            renderDashboard();
            showPage(dashboardPage);
        });

        function renderQuestionList() {
            questionListContainer.innerHTML = '';
            currentQuestions.forEach((question) => {
                const questionItem = document.createElement('div');
                questionItem.className = 'question-item';
                questionItem.textContent = question;
                questionListContainer.appendChild(questionItem);
            });
        }

        // 渲染关注名单标签
        function renderFocusTags() {
            const container = document.getElementById('focusTags');
            container.innerHTML = '';
            const students = allClassStudents[currentClass] || [];
            const focusList = loadFocusList(currentClass, currentTopic);

            students.forEach(name => {
                const tag = document.createElement('span');
                tag.className = 'focus-tag' + (focusList.includes(name) ? ' focused' : '');
                tag.textContent = name;
                tag.addEventListener('click', () => {
                    const list = loadFocusList(currentClass, currentTopic);
                    const idx = list.indexOf(name);
                    if (idx > -1) {
                        list.splice(idx, 1);
                        tag.classList.remove('focused');
                    } else {
                        list.push(name);
                        tag.classList.add('focused');
                    }
                    saveFocusList(currentClass, currentTopic, list);
                });
                container.appendChild(tag);
            });
        }

        startRecitationBtn.addEventListener('click', () => {
            recitationTitle.textContent = `${currentClass} - ${currentTopic}`;

        // ========== 抽背页逻辑 ==========
        function renderQuestionButtons() {
            questionButtons.innerHTML = '';
            const shuffledQuestions = [...currentQuestions];
            shuffleArray(shuffledQuestions);

            shuffledQuestions.forEach((question, index) => {
                const button = document.createElement('button');
                button.className = 'q-btn available';
                button.textContent = index + 1;
                button.dataset.question = question;

                button.addEventListener('click', () => {
                    if (button.classList.contains('available')) {
                        const questionText = question.replace(/^\d+\.\s/, '');
                        currentQuestionDisplay.textContent = questionText;
                        lastSelectedQuestion = questionText;
                        currentQuestionDisplay.classList.add('highlight');
                        speakText(`问题：${questionText}`);

                        setTimeout(() => {
                            currentQuestionDisplay.classList.remove('highlight');
                        }, 1000);

                        button.classList.remove('available');
                        button.classList.add('used');
                        usedQuestions.push(question);
                    }
                });

                questionButtons.appendChild(button);
            });
        }

        shuffleQuestionsBtn.addEventListener('click', () => {
            renderQuestionButtons();
        });

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // ========== 智能抽选（关注名单优先） ==========
        function getSmartTarget(students) {
            if (students.length === 0) {
                return students[0];
            }

            // 读取关注名单
            const focusList = loadFocusList(currentClass, currentTopic);

            // 关注名单中还没被抽到的学生
            const focusRemaining = students.filter(s => focusList.includes(s));

            if (focusRemaining.length > 0) {
                // 关注名单里还有人，从中随机抽
                return focusRemaining[Math.floor(Math.random() * focusRemaining.length)];
            }

            // 关注名单抽完了，从剩余学生中随机抽
            return students[Math.floor(Math.random() * students.length)];
        }

            if (currentStudents.length === 0) {
                alert('所有学生都已抽选完毕！');
                return;
            }

            isRolling = true;
            studentDisplay.classList.add('rolling');

            const isSmartMode = true; // 智能抽选默认开启

            if (isSmartMode) {
                // 智能模式：先滚动动画，2秒后停在目标学生
                const target = getSmartTarget(currentStudents);

                rollInterval = setInterval(() => {
                    const randomIndex = Math.floor(Math.random() * currentStudents.length);
                    studentDisplay.childNodes[0].textContent = currentStudents[randomIndex];
                }, 100);

                // 2秒后自动停止
                setTimeout(() => {
                    if (isRolling) {
                        clearInterval(rollInterval);
                        isRolling = false;
                        studentDisplay.classList.remove('rolling');
                        studentDisplay.childNodes[0].textContent = target;
                        lastSelectedStudent = target;
                        speakText(target, 1.0, 1.2);

                        // 从列表移除
                        const index = currentStudents.indexOf(target);
                        if (index > -1) currentStudents.splice(index, 1);

                        // 切换按钮：隐藏抽选/停止，显示通过/不通过
                        controlButtons.style.display = 'none';
                        resultButtons.style.display = 'flex';
                    }
                }, 2000);
            } else {
                // 普通模式：手动停止
                rollInterval = setInterval(() => {
                    const randomIndex = Math.floor(Math.random() * currentStudents.length);
                    studentDisplay.childNodes[0].textContent = currentStudents[randomIndex];
                }, 100);
            }
        });

        stopBtn.addEventListener('click', () => {
            if (!isRolling) return;

            clearInterval(rollInterval);
            isRolling = false;
            studentDisplay.classList.remove('rolling');

            const selectedStudent = studentDisplay.childNodes[0].textContent;
            lastSelectedStudent = selectedStudent;
            speakText(selectedStudent, 1.0, 1.2);

            const index = currentStudents.indexOf(selectedStudent);
            if (index > -1) {
                currentStudents.splice(index, 1);
            }

            // 切换按钮：隐藏抽选/停止，显示通过/不通过
            controlButtons.style.display = 'none';
            resultButtons.style.display = 'flex';
        });

        // ========== 第2步：通过/不通过按钮 ==========
        function handleResult(result) {
            // 保存记录
            if (storageAvailable && lastSelectedStudent) {
                const questionToSave = lastSelectedQuestion || '未选择问题';
                addRecord(currentClass, currentTopic, lastSelectedStudent, questionToSave, result);
            }

            // 显示反馈动画
            resultFeedback.textContent = result === 'pass' ? '✓' : '✗';
            resultFeedback.className = 'result-feedback ' + (result === 'pass' ? 'show-pass' : 'show-fail');

            // 1.5秒后恢复
            setTimeout(() => {
                resultFeedback.className = 'result-feedback';
                resultFeedback.textContent = '';
                // 恢复抽选/停止按钮
                controlButtons.style.display = 'flex';
                resultButtons.style.display = 'none';
            }, 1500);
        }

        passBtn.addEventListener('click', () => handleResult('pass'));
        failBtn.addEventListener('click', () => handleResult('fail'));

        // 返回候课页
        backToQuestionListBtn.addEventListener('click', () => {
            // 停止可能正在进行的滚动
            if (isRolling) {
                clearInterval(rollInterval);
                isRolling = false;
                studentDisplay.classList.remove('rolling');
            }
            showPage(waitingPage);
        });

        // ========== 第4步：学情看板页面 ==========
        // 返回配置页
        backToConfigBtn2.addEventListener('click', () => {
            showPage(configPage);
        });

        // 筛选变化时重新渲染
        dashboardClassFilter.addEventListener('change', () => {
            renderDashboard();
        });

        // 标签页切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });

        // 渲染学情看板
        function renderDashboard() {
            const records = loadRecords();
            const filter = dashboardClassFilter.value;
            const filtered = filter === 'all' ? records : records.filter(r => r.className === filter);

            renderTabClass(filtered, filter);
            renderTabStudent(filtered);
            renderTabTopic(filtered);
        }

        // 按班级标签页
        function renderTabClass(records, filter) {
            const container = document.getElementById('tabClass');

            if (records.length === 0) {
                container.innerHTML = '<div class="no-data">暂无抽背记录，快去抽背吧！</div>';
                return;
            }

            const totalCount = records.length;
            const passCount = records.filter(r => r.result === 'pass').length;
            const passRate = totalCount > 0 ? Math.round(passCount / totalCount * 100) : 0;

            // 按班级统计
            const classStats = {};
            records.forEach(r => {
                if (!classStats[r.className]) classStats[r.className] = { total: 0, pass: 0 };
                classStats[r.className].total++;
                if (r.result === 'pass') classStats[r.className].pass++;
            });

            let html = `
                <div class="overview-cards">
                    <div class="overview-card">
                        <div class="card-value">${totalCount}</div>
                        <div class="card-label">总抽背次数</div>
                    </div>
                    <div class="overview-card">
                        <div class="card-value">${passCount}</div>
                        <div class="card-label">通过次数</div>
                    </div>
                    <div class="overview-card">
                        <div class="card-value">${passRate}%</div>
                        <div class="card-label">总通过率</div>
                    </div>
                </div>
            `;

            if (filter === 'all' && Object.keys(classStats).length > 0) {
                html += '<div class="bar-chart">';
                Object.entries(classStats)
                    .sort((a, b) => (a[1].pass / a[1].total) - (b[1].pass / b[1].total))
                    .forEach(([cls, stat]) => {
                        const rate = Math.round(stat.pass / stat.total * 100);
                        const barClass = rate < 50 ? 'low' : rate < 75 ? 'medium' : '';
                        html += `
                            <div class="bar-row">
                                <div class="bar-label">${cls}</div>
                                <div class="bar-track">
                                    <div class="bar-fill ${barClass}" style="width: ${Math.max(rate, 2)}%">
                                        ${rate >= 20 ? `<span class="bar-value">${rate}%</span>` : ''}
                                    </div>
                                </div>
                                ${rate < 20 ? `<span class="bar-value-outside">${rate}%</span>` : ''}
                            </div>
                        `;
                    });
                html += '</div>';
            }

            container.innerHTML = html;
        }

        // 按学生标签页
        function renderTabStudent(records) {
            const container = document.getElementById('tabStudent');

            if (records.length === 0) {
                container.innerHTML = '<div class="no-data">暂无抽背记录</div>';
                return;
            }

            // 按学生统计
            const studentStats = {};
            records.forEach(r => {
                if (!studentStats[r.student]) studentStats[r.student] = { total: 0, pass: 0, className: r.className };
                studentStats[r.student].total++;
                if (r.result === 'pass') studentStats[r.student].pass++;
            });

            // 按通过率排序（低的在前）
            const sorted = Object.entries(studentStats).sort((a, b) => {
                const rateA = a[1].pass / a[1].total;
                const rateB = b[1].pass / b[1].total;
                return rateA - rateB;
            });

            let html = `
                <table class="student-table">
                    <thead>
                        <tr>
                            <th>姓名</th>
                            <th>班级</th>
                            <th>被抽次数</th>
                            <th>通过次数</th>
                            <th>通过率</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            sorted.forEach(([name, stat]) => {
                const rate = Math.round(stat.pass / stat.total * 100);
                const rateClass = rate < 50 ? 'rate-low' : rate < 75 ? 'rate-medium' : 'rate-high';
                html += `
                    <tr>
                        <td>${name}</td>
                        <td>${stat.className}</td>
                        <td>${stat.total}</td>
                        <td>${stat.pass}</td>
                        <td class="${rateClass}">${rate}%</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // 按课题标签页
        function renderTabTopic(records) {
            const container = document.getElementById('tabTopic');

            if (records.length === 0) {
                container.innerHTML = '<div class="no-data">暂无抽背记录</div>';
                return;
            }

            // 按课题统计
            const topicStats = {};
            records.forEach(r => {
                if (!topicStats[r.topic]) topicStats[r.topic] = { total: 0, pass: 0 };
                topicStats[r.topic].total++;
                if (r.result === 'pass') topicStats[r.topic].pass++;
            });

            let html = '<div class="bar-chart">';
            Object.entries(topicStats)
                .sort((a, b) => (a[1].pass / a[1].total) - (b[1].pass / b[1].total))
                .forEach(([topic, stat]) => {
                    const rate = Math.round(stat.pass / stat.total * 100);
                    const barClass = rate < 50 ? 'low' : rate < 75 ? 'medium' : '';
                    html += `
                        <div class="bar-row">
                            <div class="bar-label" title="${topic}">${topic.length > 8 ? topic.slice(0, 8) + '...' : topic}</div>
                            <div class="bar-track">
                                <div class="bar-fill ${barClass}" style="width: ${Math.max(rate, 2)}%">
                                    ${rate >= 20 ? `<span class="bar-value">${stat.pass}/${stat.total} (${rate}%)</span>` : ''}
                                </div>
                            </div>
                            ${rate < 20 ? `<span class="bar-value-outside">${stat.pass}/${stat.total} (${rate}%)</span>` : ''}
                        </div>
                    `;
                });
            html += '</div>';

            container.innerHTML = html;
        }

        // ========== 第5步：CSV导出 ==========
        exportCsvBtn.addEventListener('click', () => {
            const records = loadRecords();
            const filter = dashboardClassFilter.value;
            const filtered = filter === 'all' ? records : records.filter(r => r.className === filter);

            if (filtered.length === 0) {
                alert('没有可导出的数据');
                return;
            }

            // BOM头 + CSV内容
            const BOM = '\uFEFF';
            const header = '日期,时间,班级,课题,学生,问题,结果\n';
            const rows = filtered.map(r => {
                const resultText = r.result === 'pass' ? '通过' : '不通过';
                // CSV中包含逗号或引号的字段需要用引号括起来
                const escapeCsv = (s) => {
                    if (s && (s.includes(',') || s.includes('"') || s.includes('\n'))) {
                        return '"' + s.replace(/"/g, '""') + '"';
                    }
                    return s || '';
                };
                return [r.date, r.time, r.className, r.topic, r.student, escapeCsv(r.question), resultText].join(',');
            }).join('\n');

            const csvContent = BOM + header + rows;

            try {
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                const dateStr = new Date().toLocaleDateString('zh-CN').replace(/\//g, '-');
                link.download = `抽背记录_${filter === 'all' ? '全部班级' : filter}_${dateStr}.csv`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            } catch (e) {
                // 备选方案：弹出文本框让老师复制
                const textarea = document.createElement('textarea');
                textarea.value = header + rows;
                textarea.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;height:60%;z-index:9999;font-size:14px;padding:20px;';
                document.body.appendChild(textarea);
                textarea.select();
                alert('自动下载不支持，请复制文本框内容到Excel。按任意键关闭。');
                textarea.addEventListener('blur', () => document.body.removeChild(textarea));
            }
        });

        // 清空数据按钮
        clearDataBtn.addEventListener('click', () => {
            if (confirm('确定要清空所有抽背记录吗？此操作不可撤销！')) {
                if (confirm('再次确认：真的要删除全部数据吗？')) {
                    saveRecords([]);
                    renderDashboard();
                    alert('数据已清空');
                }
            }
        });

        // ========== 第6步：初始化检测和收尾 ==========
        function initApp() {
            // 检测 localStorage
            storageAvailable = isStorageAvailable();
            if (!storageAvailable) {
                alert('提示：当前浏览器不支持本地存储，抽背记录将无法保存。\n建议使用 Chrome 或 Edge 浏览器打开此文件。');
            }

            currentStudents = [...allClassStudents[currentClass]];
            currentQuestions = [...topicQuestions[currentTopic]];
            renderQuestionList();
        }

        initApp();
    </script>
</body>
</html>
