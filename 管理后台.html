<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级抽背大师 · 管理后台 v2.1.0</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: #333;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 1000px;
            max-width: 95%;
            min-height: 750px;
            max-height: 90vh;
            position: relative;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            min-height: 750px;
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            overflow-y: auto;
        }

        .page.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
            z-index: 10;
        }

        h1 {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 1.5rem;
        }

        h2 {
            font-size: 1.6rem;
            color: #2c3e50;
            margin-bottom: 1rem;
        }

        /* 首页导航按钮 */
        .nav-grid {
            display: flex;
            gap: 20px;
            margin-top: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            padding: 20px 40px;
            font-size: 1.3rem;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            color: white;
            min-width: 200px;
        }

        .nav-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }

        .nav-btn.dashboard {
            background: linear-gradient(135deg, #4CAF50 0%, #8BC34A 100%);
        }

        .nav-btn.focus {
            background: linear-gradient(135deg, #ff9800 0%, #ffc107 100%);
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 20;
        }

        /* ========== 关注名单页样式 ========== */
        .focus-config {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .focus-select {
            padding: 10px 18px;
            font-size: 1.1rem;
            border-radius: 10px;
            border: 2px solid #ff9800;
            background-color: white;
            color: #333;
            cursor: pointer;
        }

        .focus-count {
            font-size: 1rem;
            color: #666;
            margin-bottom: 1rem;
        }

        .focus-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 15px;
            width: 100%;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .focus-tag {
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            border: 2px solid #e0e0e0;
            background: white;
            color: #666;
            transition: all 0.15s ease;
            user-select: none;
        }

        .focus-tag:hover {
            border-color: #ff9800;
        }

        .focus-tag.focused {
            background: linear-gradient(135deg, #ff9800 0%, #ffc107 100%);
            color: white;
            border-color: #ff9800;
            font-weight: bold;
        }

        .focus-actions {
            display: flex;
            gap: 10px;
            margin-top: 1rem;
        }

        .btn-small {
            padding: 8px 20px;
            font-size: 0.95rem;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
            color: white;
        }

        .btn-small:hover {
            transform: translateY(-2px);
        }

        .btn-small.clear {
            background: linear-gradient(135deg, #f44336 0%, #e91e63 100%);
        }

        .btn-small.select-all {
            background: linear-gradient(135deg, #ff9800 0%, #ffc107 100%);
        }

        /* ========== 学情看板样式 ========== */
        .dashboard-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .dashboard-header h2 {
            margin-bottom: 0;
        }

        .dashboard-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .dashboard-select {
            padding: 8px 15px;
            font-size: 1rem;
            border-radius: 8px;
            border: 2px solid #4CAF50;
            background-color: white;
            color: #333;
            cursor: pointer;
        }

        .btn-export {
            background: linear-gradient(135deg, #ff9800 0%, #ffc107 100%);
            color: white;
            padding: 8px 20px;
            font-size: 1rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.15);
        }

        .btn-export:hover {
            transform: translateY(-2px);
        }

        .btn-clear-data {
            background: linear-gradient(135deg, #f44336 0%, #e91e63 100%);
            color: white;
            padding: 8px 20px;
            font-size: 1rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.15);
        }

        .btn-clear-data:hover {
            transform: translateY(-2px);
        }

        /* 标签页切换 */
        .tab-bar {
            display: flex;
            gap: 0;
            width: 100%;
            margin-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            background: transparent;
            color: #999;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s ease;
            margin-bottom: -2px;
        }

        .tab-btn.active {
            color: #4CAF50;
            border-bottom-color: #4CAF50;
        }

        .tab-btn:hover {
            color: #4CAF50;
        }

        .tab-content {
            display: none;
            width: 100%;
            flex-grow: 1;
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
        }

        /* 总览卡片 */
        .overview-cards {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .overview-card {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            min-width: 140px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        .overview-card .card-value {
            font-size: 2rem;
            font-weight: bold;
        }

        .overview-card .card-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* 纯CSS条形图 */
        .bar-chart {
            width: 100%;
            text-align: left;
        }

        .bar-row {
            display: flex;
            align-items: center;
            margin: 8px 0;
            gap: 10px;
        }

        .bar-label {
            min-width: 120px;
            font-size: 0.95rem;
            text-align: right;
            color: #555;
            flex-shrink: 0;
        }

        .bar-track {
            flex-grow: 1;
            height: 28px;
            background: #f0f0f0;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            border-radius: 14px;
            background: linear-gradient(90deg, #4CAF50 0%, #8BC34A 100%);
            transition: width 0.6s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            min-width: 0;
        }

        .bar-fill.low {
            background: linear-gradient(90deg, #f44336 0%, #ff5722 100%);
        }

        .bar-fill.medium {
            background: linear-gradient(90deg, #ff9800 0%, #ffc107 100%);
        }

        .bar-value {
            font-size: 0.85rem;
            font-weight: bold;
            color: white;
            white-space: nowrap;
        }

        .bar-value-outside {
            font-size: 0.85rem;
            font-weight: bold;
            color: #666;
            margin-left: 8px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* 学生表格 */
        .student-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .student-table th {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 10px 12px;
            text-align: center;
            position: sticky;
            top: 0;
        }

        .student-table td {
            padding: 8px 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .student-table tr:hover {
            background-color: #f5f5f5;
        }

        .student-table .rate-low {
            color: #f44336;
            font-weight: bold;
        }

        .student-table .rate-medium {
            color: #ff9800;
            font-weight: bold;
        }

        .student-table .rate-high {
            color: #4CAF50;
            font-weight: bold;
        }

        .no-data {
            text-align: center;
            color: #999;
            font-size: 1.2rem;
            padding: 40px 0;
        }

        @media (max-width: 768px) {
            .container {
                min-height: auto;
            }

            h1 {
                font-size: 1.6rem;
            }

            .nav-btn {
                min-width: 150px;
                padding: 15px 25px;
                font-size: 1.1rem;
            }

            .bar-label {
                min-width: 80px;
                font-size: 0.85rem;
            }

            .overview-card {
                min-width: 100px;
                padding: 10px 15px;
            }

            .overview-card .card-value {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页：功能导航 -->
        <div class="page active" id="homePage">
            <h1>超级抽背大师 · 管理后台</h1>
            <p style="color: #999; font-size: 1.1rem; margin-bottom: 1rem;">教师专用，管理学情数据和关注名单</p>

            <div class="nav-grid">
                <button class="nav-btn dashboard" id="gotoDashboardBtn">学情看板</button>
                <button class="nav-btn focus" id="gotoFocusBtn">关注名单</button>
            </div>
        </div>

        <!-- 学情看板页 -->
        <div class="page" id="dashboardPage">
            <button class="back-btn" id="backFromDashboard">←</button>

            <div class="dashboard-header">
                <h2>学情看板</h2>
                <div class="dashboard-controls">
                    <select id="dashboardClassFilter" class="dashboard-select">
                        <option value="all">全部班级</option>
                        <option value="高一8班">高一8班</option>
                        <option value="高一12班">高一12班</option>
                        <option value="高一16班">高一16班</option>
                        <option value="高一20班">高一20班</option>
                    </select>
                    <button class="btn-export" id="exportCsvBtn">导出CSV</button>
                    <button class="btn-clear-data" id="clearDataBtn">清空数据</button>
                </div>
            </div>

            <div class="tab-bar">
                <button class="tab-btn active" data-tab="tabClass">按班级</button>
                <button class="tab-btn" data-tab="tabStudent">按学生</button>
                <button class="tab-btn" data-tab="tabTopic">按课题</button>
            </div>

            <div class="tab-content active" id="tabClass"></div>
            <div class="tab-content" id="tabStudent"></div>
            <div class="tab-content" id="tabTopic"></div>
        </div>

        <!-- 关注名单页 -->
        <div class="page" id="focusPage">
            <button class="back-btn" id="backFromFocus">←</button>
            <h2>关注名单设置</h2>
            <p style="color: #999; margin-bottom: 1rem;">选择班级和课题，点击学生姓名设为关注（橙色 = 已关注）</p>

            <div class="focus-config">
                <select id="focusClassSelect" class="focus-select">
                    <option value="高一8班" selected>高一8班</option>
                    <option value="高一12班">高一12班</option>
                    <option value="高一16班">高一16班</option>
                    <option value="高一20班">高一20班</option>
                </select>
                <select id="focusTopicSelect" class="focus-select">
                    <option value="导论（时代精神的精华）">导论（时代精神的精华）</option>
                    <option value="唯物论">唯物论</option>
                    <option value="辩证法（上）" selected>辩证法（上）</option>
                    <option value="辩证法（下）">辩证法（下）</option>
                    <option value="认识论">认识论</option>
                    <option value="历史唯物主义">历史唯物主义</option>
                    <option value="实现人生的价值">实现人生的价值</option>
                </select>
            </div>

            <div class="focus-count" id="focusCount">已关注：0 人</div>

            <div class="focus-tags" id="focusTags"></div>

            <div class="focus-actions">
                <button class="btn-small clear" id="clearFocusBtn">清空本组</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 数据层（与教室版共享同一 localStorage） ==========
        const STORAGE_KEY = 'chouBeiDaShi_records';
        const FOCUS_KEY = 'chouBeiDaShi_focus';

        function loadRecords() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        }

        function saveRecords(records) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            } catch (e) {
                alert('保存失败');
            }
        }

        function loadFocusList(className, topic) {
            try {
                const data = localStorage.getItem(FOCUS_KEY);
                const all = data ? JSON.parse(data) : {};
                const key = className + '|' + topic;
                return all[key] || [];
            } catch (e) {
                return [];
            }
        }

        function saveFocusList(className, topic, list) {
            try {
                const data = localStorage.getItem(FOCUS_KEY);
                const all = data ? JSON.parse(data) : {};
                const key = className + '|' + topic;
                all[key] = list;
                localStorage.setItem(FOCUS_KEY, JSON.stringify(all));
            } catch (e) {
                alert('保存关注名单失败');
            }
        }

        // ========== 学生数据（与教室版一致） ==========
        const allClassStudents = {
            "高一8班": ["王雨诺", "马樱萁", "颜秉泽", "朱政宇", "苏宇昂", "任乐意", "涂皓然", "许斯源", "刘浩然", "金轩宇", "王子旭", "方可尧", "孙文康", "张凌菲", "潘宝洋", "宋沐涵", "印子轩", "陈乃煌", "许其乐", "刘耕图", "孙笑笑", "韩耀东", "潘奕凯", "曹博", "苗文壮", "王诗俊", "王芸轩", "梁皓然", "张冉", "冯靖茹", "王文瑄", "刘佳鑫", "李昱辰", "陈俊艺", "葛建君", "赵仁杰", "李欣泽", "王安贤", "王冬", "邱子航", "王钰涵", "胡宇翔", "黄友乐", "李笑", "胡俊杰", "薛雅文", "孙畅", "崔毓轩", "顾涵博", "高梓茗", "于淳溪"],
            "高一12班": ["倪梓赫", "张文豪", "朱姯耀", "穆威竹", "方添瑞", "刘昱辰", "王雨欣", "陈永翔", "张梓墨", "周诗雅", "田思涵", "李牧纯", "赵志烜", "郭茜蕊", "卞思辰", "卞一棱", "王姝珩", "刘语梵", "孙艺齐", "仲子茹", "林贝格", "龙威邑", "姜婧雯", "田金苗", "李梦洁", "杨滨如", "章馨月", "赵婉琪", "葛小朵", "张芸菲", "张书涵", "马君涵", "温佳蓉", "于清涵", "胡一凡", "王熠楷", "班瑞欣", "陈炳瑀"],
            "高一16班": ["张冉佳", "陈欣妍", "刘耘珲", "朱芮娴", "侍津宇", "刘奕彤", "李依依", "万庆庆", "黄彦璋", "罗福山", "王谱霖", "蒋可睿", "吴思汶", "李语哲", "龚乙涵", "陈诗文", "吴承俊", "封思羽", "丁雅文", "王梓安", "刘浩宇", "窦星宇", "钱诗琦", "蒋沁言", "王怀博", "支禹泽", "李蕙妤", "徐鸣蔚", "范子萱", "唐煜杰", "张博", "陆熙哲", "刘婧", "李玉婷", "张圆圆", "王昱琦", "李语汐", "武楚涵", "仲新悦", "徐国方", "高煜然", "刘皓博", "王一哲", "徐新权", "王雨馨", "孙凡淼", "周思彤", "谢明辰", "王浩宇", "王山林", "乔煜卿", "李晓玲", "郭骐瑞", "朱祖贤"],
            "高一20班": ["陈鹏", "刘前隆", "李国豪", "徐延谋", "闫晨浩", "立芸溪", "王溪源", "陶宣霖", "王嘉洋", "屠曦菡", "孙华阳", "霍云飞", "徐恺圻", "相俊宇", "许刚源", "刘宸宇", "庄士晏", "黄楚淇", "范芷含", "姜庆媛", "孙晟益", "谢林都", "邱睿喆", "刘加一", "高浩然", "李尚燃", "仲玟", "李昀键", "李光峰", "封润芝", "马浩然", "张炜翔", "茆珺彦", "李卓洋", "赵浩然", "李同川", "孙浩然", "张振涵", "江祥文", "王子阳", "李瑶", "钱一举", "何祉衡", "夏启哲", "颜秉轩", "鲍锦鹏", "王露翔", "张歆瑶", "曹艺馨", "徐梓航", "黄继民", "刘凡铭", "刘奕铭", "贾瀚翔", "闫智杰", "于济恺", "曾泓玮", "刘权庆"]
        };

        // ========== 页面切换 ==========
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            page.classList.add('active');
        }

        const homePage = document.getElementById('homePage');
        const dashboardPage = document.getElementById('dashboardPage');
        const focusPage = document.getElementById('focusPage');

        // 导航
        document.getElementById('gotoDashboardBtn').addEventListener('click', () => {
            renderDashboard();
            showPage(dashboardPage);
        });

        document.getElementById('gotoFocusBtn').addEventListener('click', () => {
            renderFocusTags();
            showPage(focusPage);
        });

        // 返回按钮
        document.getElementById('backFromDashboard').addEventListener('click', () => showPage(homePage));
        document.getElementById('backFromFocus').addEventListener('click', () => showPage(homePage));

        // ========== 关注名单管理 ==========
        const focusClassSelect = document.getElementById('focusClassSelect');
        const focusTopicSelect = document.getElementById('focusTopicSelect');
        const focusCountEl = document.getElementById('focusCount');

        // 切换班级/课题时重新渲染
        focusClassSelect.addEventListener('change', renderFocusTags);
        focusTopicSelect.addEventListener('change', renderFocusTags);

        function renderFocusTags() {
            const cls = focusClassSelect.value;
            const topic = focusTopicSelect.value;
            const container = document.getElementById('focusTags');
            container.innerHTML = '';

            const students = allClassStudents[cls] || [];
            const focusList = loadFocusList(cls, topic);

            students.forEach(name => {
                const tag = document.createElement('span');
                tag.className = 'focus-tag' + (focusList.includes(name) ? ' focused' : '');
                tag.textContent = name;
                tag.addEventListener('click', () => {
                    const list = loadFocusList(cls, topic);
                    const idx = list.indexOf(name);
                    if (idx > -1) {
                        list.splice(idx, 1);
                        tag.classList.remove('focused');
                    } else {
                        list.push(name);
                        tag.classList.add('focused');
                    }
                    saveFocusList(cls, topic, list);
                    updateFocusCount();
                });
                container.appendChild(tag);
            });

            updateFocusCount();
        }

        function updateFocusCount() {
            const cls = focusClassSelect.value;
            const topic = focusTopicSelect.value;
            const list = loadFocusList(cls, topic);
            focusCountEl.textContent = `已关注：${list.length} 人`;
        }

        // 清空当前班级+课题的关注名单
        document.getElementById('clearFocusBtn').addEventListener('click', () => {
            const cls = focusClassSelect.value;
            const topic = focusTopicSelect.value;
            if (confirm(`确定清空 ${cls} · ${topic} 的关注名单？`)) {
                saveFocusList(cls, topic, []);
                renderFocusTags();
            }
        });

        // ========== 学情看板 ==========
        const dashboardClassFilter = document.getElementById('dashboardClassFilter');
        dashboardClassFilter.addEventListener('change', renderDashboard);

        // 标签页切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });

        function renderDashboard() {
            const records = loadRecords();
            const filter = dashboardClassFilter.value;
            const filtered = filter === 'all' ? records : records.filter(r => r.className === filter);

            renderTabClass(filtered, filter);
            renderTabStudent(filtered);
            renderTabTopic(filtered);
        }

        function renderTabClass(records, filter) {
            const container = document.getElementById('tabClass');

            if (records.length === 0) {
                container.innerHTML = '<div class="no-data">暂无抽背记录，快去抽背吧！</div>';
                return;
            }

            const totalCount = records.length;
            const passCount = records.filter(r => r.result === 'pass').length;
            const passRate = totalCount > 0 ? Math.round(passCount / totalCount * 100) : 0;

            const classStats = {};
            records.forEach(r => {
                if (!classStats[r.className]) classStats[r.className] = { total: 0, pass: 0 };
                classStats[r.className].total++;
                if (r.result === 'pass') classStats[r.className].pass++;
            });

            let html = `
                <div class="overview-cards">
                    <div class="overview-card">
                        <div class="card-value">${totalCount}</div>
                        <div class="card-label">总抽背次数</div>
                    </div>
                    <div class="overview-card">
                        <div class="card-value">${passCount}</div>
                        <div class="card-label">通过次数</div>
                    </div>
                    <div class="overview-card">
                        <div class="card-value">${passRate}%</div>
                        <div class="card-label">总通过率</div>
                    </div>
                </div>
            `;

            if (filter === 'all' && Object.keys(classStats).length > 0) {
                html += '<div class="bar-chart">';
                Object.entries(classStats)
                    .sort((a, b) => (a[1].pass / a[1].total) - (b[1].pass / b[1].total))
                    .forEach(([cls, stat]) => {
                        const rate = Math.round(stat.pass / stat.total * 100);
                        const barClass = rate < 50 ? 'low' : rate < 75 ? 'medium' : '';
                        html += `
                            <div class="bar-row">
                                <div class="bar-label">${cls}</div>
                                <div class="bar-track">
                                    <div class="bar-fill ${barClass}" style="width: ${Math.max(rate, 2)}%">
                                        ${rate >= 20 ? `<span class="bar-value">${rate}%</span>` : ''}
                                    </div>
                                </div>
                                ${rate < 20 ? `<span class="bar-value-outside">${rate}%</span>` : ''}
                            </div>
                        `;
                    });
                html += '</div>';
            }

            container.innerHTML = html;
        }

        function renderTabStudent(records) {
            const container = document.getElementById('tabStudent');

            if (records.length === 0) {
                container.innerHTML = '<div class="no-data">暂无抽背记录</div>';
                return;
            }

            const studentStats = {};
            records.forEach(r => {
                if (!studentStats[r.student]) studentStats[r.student] = { total: 0, pass: 0, className: r.className };
                studentStats[r.student].total++;
                if (r.result === 'pass') studentStats[r.student].pass++;
            });

            const sorted = Object.entries(studentStats).sort((a, b) => {
                const rateA = a[1].pass / a[1].total;
                const rateB = b[1].pass / b[1].total;
                return rateA - rateB;
            });

            let html = `
                <table class="student-table">
                    <thead>
                        <tr>
                            <th>姓名</th>
                            <th>班级</th>
                            <th>被抽次数</th>
                            <th>通过次数</th>
                            <th>通过率</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            sorted.forEach(([name, stat]) => {
                const rate = Math.round(stat.pass / stat.total * 100);
                const rateClass = rate < 50 ? 'rate-low' : rate < 75 ? 'rate-medium' : 'rate-high';
                html += `
                    <tr>
                        <td>${name}</td>
                        <td>${stat.className}</td>
                        <td>${stat.total}</td>
                        <td>${stat.pass}</td>
                        <td class="${rateClass}">${rate}%</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function renderTabTopic(records) {
            const container = document.getElementById('tabTopic');

            if (records.length === 0) {
                container.innerHTML = '<div class="no-data">暂无抽背记录</div>';
                return;
            }

            const topicStats = {};
            records.forEach(r => {
                if (!topicStats[r.topic]) topicStats[r.topic] = { total: 0, pass: 0 };
                topicStats[r.topic].total++;
                if (r.result === 'pass') topicStats[r.topic].pass++;
            });

            let html = '<div class="bar-chart">';
            Object.entries(topicStats)
                .sort((a, b) => (a[1].pass / a[1].total) - (b[1].pass / b[1].total))
                .forEach(([topic, stat]) => {
                    const rate = Math.round(stat.pass / stat.total * 100);
                    const barClass = rate < 50 ? 'low' : rate < 75 ? 'medium' : '';
                    html += `
                        <div class="bar-row">
                            <div class="bar-label" title="${topic}">${topic.length > 8 ? topic.slice(0, 8) + '...' : topic}</div>
                            <div class="bar-track">
                                <div class="bar-fill ${barClass}" style="width: ${Math.max(rate, 2)}%">
                                    ${rate >= 20 ? `<span class="bar-value">${stat.pass}/${stat.total} (${rate}%)</span>` : ''}
                                </div>
                            </div>
                            ${rate < 20 ? `<span class="bar-value-outside">${stat.pass}/${stat.total} (${rate}%)</span>` : ''}
                        </div>
                    `;
                });
            html += '</div>';

            container.innerHTML = html;
        }

        // ========== CSV导出 ==========
        document.getElementById('exportCsvBtn').addEventListener('click', () => {
            const records = loadRecords();
            const filter = dashboardClassFilter.value;
            const filtered = filter === 'all' ? records : records.filter(r => r.className === filter);

            if (filtered.length === 0) {
                alert('没有可导出的数据');
                return;
            }

            const BOM = '\uFEFF';
            const header = '日期,时间,班级,课题,学生,问题,结果\n';
            const rows = filtered.map(r => {
                const resultText = r.result === 'pass' ? '通过' : '不通过';
                const escapeCsv = (s) => {
                    if (s && (s.includes(',') || s.includes('"') || s.includes('\n'))) {
                        return '"' + s.replace(/"/g, '""') + '"';
                    }
                    return s || '';
                };
                return [r.date, r.time, r.className, r.topic, r.student, escapeCsv(r.question), resultText].join(',');
            }).join('\n');

            const csvContent = BOM + header + rows;

            try {
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                const dateStr = new Date().toLocaleDateString('zh-CN').replace(/\//g, '-');
                link.download = `抽背记录_${filter === 'all' ? '全部班级' : filter}_${dateStr}.csv`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            } catch (e) {
                const textarea = document.createElement('textarea');
                textarea.value = header + rows;
                textarea.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;height:60%;z-index:9999;font-size:14px;padding:20px;';
                document.body.appendChild(textarea);
                textarea.select();
                alert('自动下载不支持，请复制文本框内容到Excel。');
                textarea.addEventListener('blur', () => document.body.removeChild(textarea));
            }
        });

        // 清空数据
        document.getElementById('clearDataBtn').addEventListener('click', () => {
            if (confirm('确定要清空所有抽背记录吗？此操作不可撤销！')) {
                if (confirm('再次确认：真的要删除全部数据吗？')) {
                    saveRecords([]);
                    renderDashboard();
                    alert('数据已清空');
                }
            }
        });
    </script>
</body>
</html>
